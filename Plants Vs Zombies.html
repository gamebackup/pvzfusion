<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>Plants Vs Zombies: Fusion</title>

    <!-- Preloads – no crossorigin needed for same-origin -->
    <link rel="preload" href="Plants%20Vs%20Zombies_files/BuildPvzFusiom.wasm.unityweb" as="fetch" type="application/wasm">
    <link rel="preload" href="BuildPvzFusiom.data.unityweb" as="fetch">
    <link rel="preload" href="Plants%20Vs%20Zombies_files/BuildPvzFusiom.framework.js" as="script">

    <style>
        html, body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        .fullscreen-canvas {
            background: #242424;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .fullscreen {
            background: #242424;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }
        #loading-overlay {
            font-size: 20px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #logo {
            width: 10%;
            max-width: 300px;
            min-width: 120px;
            overflow: visible;
        }
        .fill-rect {
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
        }
        #gradientMover {
            display: none;
        }
        .gradient-mover {
            animation: moveGradient 0.4s linear;
        }
        @keyframes moveGradient {
            0% { transform: translateX(0); }
            100% { transform: translateX(-250%); }
        }
        .logo-fade-out {
            animation: logoFadeOut 1s linear;
        }
        .logo-fade-out path {
            fill: white;
            stroke: white;
        }
        @keyframes logoFadeOut {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <canvas id="canvas" class="fullscreen-canvas"></canvas>
    <div id="loading-overlay" class="fullscreen">...</div>

    <!-- Mock Yandex SDK & Playgama Bridge -->
    <script>
        window.YaGames = {
            init: function() {
                return Promise.resolve({
                    getPlayer: function() { return Promise.resolve({ getName: () => 'Player' }); },
                    getEnvironment: () => ({ app: { id: '456912' } }),
                    features: { LoadingAPI: { ready: () => {} } },
                    screen: { fullscreen: { request: () => {} } }
                });
            }
        };
        window.PlaygamaBridge = {
            isAvailable: true,
            gameReady: function() { console.log('Mock: gameReady called'); },
            loadingProgress: function(progress) { console.log('Mock: loading progress', progress); },
            on: function(event, callback) {
                if (event === 'game_ready') callback();
            },
            send: function(event, data) {}
        };
        window.playgamaBridge = window.PlaygamaBridge;
    </script>

    <!-- Original Yandex/Unity loader – it knows how to start the game -->
    <script src="index.756381f9bf474c3d5a3d.js.js"></script>
</body>
</html>
